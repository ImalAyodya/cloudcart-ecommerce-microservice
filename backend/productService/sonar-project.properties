# ── SonarCloud project settings ──────────────────────────────────────────────
# Replace the values below with your own SonarCloud organization & project key.
# How to find them: sonarcloud.io → your project → Administration → Update Key

sonar.organization=YOUR_SONARCLOUD_ORG_KEY
sonar.projectKey=YOUR_SONARCLOUD_ORG_KEY_cloudcart-product-service
sonar.projectName=CloudCart – Product Service
sonar.projectVersion=1.0

# Source directory (relative to this file's location)
sonar.sources=src
sonar.exclusions=**/node_modules/**,**/tests/**,**/*.test.js,**/*.spec.js

# Language
sonar.language=js
sonar.javascript.lcov.reportPaths=coverage/lcov.info
