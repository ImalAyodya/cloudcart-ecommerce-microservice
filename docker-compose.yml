version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# CloudCart – full-stack docker-compose
#
# Usage:
#   1. Copy .env.example to .env and fill in your values.
#   2. Build & run:        docker compose up --build
#   3. Push to Docker Hub: docker compose push
#
# Image naming follows:  <DOCKER_HUB_USERNAME>/<service>:<TAG>
# Set DOCKER_HUB_USERNAME in your .env (or shell) before pushing.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Shared MongoDB ──────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  # ── Product Service (port 5000) ─────────────────────────────────────────────
  product-service:
    image: ${DOCKER_HUB_USERNAME:-cloudcart}/product-service:${TAG:-latest}
    build:
      context: ./backend/productService
      dockerfile: Dockerfile
    environment:
      - PORT=5000
      - MONGO_URI=${PRODUCT_MONGO_URI:-mongodb://mongo:27017/productdb}
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    restart: unless-stopped

  # ── User Service (port 5001) ────────────────────────────────────────────────
  user-service:
    image: ${DOCKER_HUB_USERNAME:-cloudcart}/user-service:${TAG:-latest}
    build:
      context: ./backend/userService
      dockerfile: Dockerfile
    environment:
      - PORT=5001
      - MONGO_URI=${USER_MONGO_URI:-mongodb://mongo:27017/userdb}
      - JWT_SECRET=${JWT_SECRET:-changeme_please_in_production}
      - TOKEN_EXPIRES_IN=${TOKEN_EXPIRES_IN:-7d}
    ports:
      - "5001:5001"
    depends_on:
      - mongo
    restart: unless-stopped

  # ── Payment Service (port 5002) ─────────────────────────────────────────────
  payment-service:
    image: ${DOCKER_HUB_USERNAME:-cloudcart}/payment-service:${TAG:-latest}
    build:
      context: ./backend/paymentService
      dockerfile: Dockerfile
    environment:
      - PORT=5002
    ports:
      - "5002:5002"
    restart: unless-stopped

  # ── Order Service (port 5003) ───────────────────────────────────────────────
  order-service:
    image: ${DOCKER_HUB_USERNAME:-cloudcart}/order-service:${TAG:-latest}
    build:
      context: ./backend/orderService
      dockerfile: Dockerfile
    environment:
      - PORT=5003
      - MONGO_URI=${ORDER_MONGO_URI:-mongodb://mongo:27017/orderdb}
      - USER_SERVICE_URL=http://user-service:5001
      - PRODUCT_SERVICE_URL=http://product-service:5000
      - PAYMENT_SERVICE_URL=http://payment-service:5002
    ports:
      - "5003:5003"
    depends_on:
      - mongo
      - user-service
      - product-service
      - payment-service
    restart: unless-stopped

  # ── Notification Service (port 5003) ────────────────────────────────────────
  notification-service:
    image: ${DOCKER_HUB_USERNAME:-cloudcart}/notification-service:${TAG:-latest}
    build:
      context: ./backend/notificationService
      dockerfile: Dockerfile
    environment:
      - PORT=5003
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
    ports:
      - "5003:5003"
    restart: unless-stopped

  # ── API Gateway (port 3000) ─────────────────────────────────────────────────
  api-gateway:
    image: ${DOCKER_HUB_USERNAME:-cloudcart}/api-gateway:${TAG:-latest}
    build:
      context: ./backend/apiGateway
      dockerfile: Dockerfile
    environment:
      - PORT=3000
      - PRODUCT_SERVICE_URL=http://product-service:5000
      - USER_SERVICE_URL=http://user-service:5001
      - ORDER_SERVICE_URL=http://order-service:5003
      - PAYMENT_SERVICE_URL=http://payment-service:5002
    ports:
      - "3000:3000"
    depends_on:
      - product-service
      - user-service
      - order-service
      - payment-service
    restart: unless-stopped

  # ── Frontend (port 80) ──────────────────────────────────────────────────────
  frontend:
    image: ${DOCKER_HUB_USERNAME:-cloudcart}/frontend:${TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_GATEWAY_URL=${VITE_API_GATEWAY_URL:-http://localhost:3000}
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    restart: unless-stopped

volumes:
  mongo-data:
