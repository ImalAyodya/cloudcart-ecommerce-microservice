# ── SonarCloud project settings ──────────────────────────────────────────────
# Replace the two values below with your own SonarCloud organization & project
# key (sonarcloud.io → your project → Administration → Update Key).

sonar.organization=chamithusithmaka
sonar.projectKey=chamithusithmaka_cloudcart-ecommerce-microservice
sonar.projectName=CloudCart Ecommerce Microservice
sonar.projectVersion=1.0

# ── Source paths (all microservices + frontend) ───────────────────────────────
sonar.sources=backend/productService/src,backend/userService/src,backend/orderService/src,backend/paymentService,backend/notificationService,backend/apiGateway,frontend/src

# ── Exclusions ────────────────────────────────────────────────────────────────
sonar.exclusions=**/node_modules/**,**/tests/**,**/*.test.js,**/*.spec.js,**/dist/**,**/build/**,**/coverage/**

# ── Language ──────────────────────────────────────────────────────────────────
sonar.language=js
sonar.sourceEncoding=UTF-8
